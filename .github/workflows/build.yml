name: Build and Push Container Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/anna-containers

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./base
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/base:latest
            ${{ env.IMAGE_PREFIX }}/base:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-sglang:
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./sglang
          push: true
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}/base:latest
          tags: |
            ${{ env.IMAGE_PREFIX }}/sglang:latest
            ${{ env.IMAGE_PREFIX }}/sglang:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-vllm:
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./vllm
          push: true
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}/base:latest
          tags: |
            ${{ env.IMAGE_PREFIX }}/vllm:latest
            ${{ env.IMAGE_PREFIX }}/vllm:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-ollama:
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./ollama
          push: true
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}/base:latest
          tags: |
            ${{ env.IMAGE_PREFIX }}/ollama:latest
            ${{ env.IMAGE_PREFIX }}/ollama:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
